# configs/agents/lats.yaml

lats:
  name: lats
  enabled: true
  save_prompt: true
  save_context: false
  skip_if_completed: false
  max_depth: 5
  branching_factor: 3
  ucb_weight: 1.41
  num_simulations: 50
  use_memory_for_fast_prompts: false

  model:
    name: ollama/qwen3
    api_base: http://localhost:11434
    api_key: null
  input_keys: ["goal"]   # add nodes
  output_key: lats  # change
  prompt_mode: file
  prompt_file: lats.txt
